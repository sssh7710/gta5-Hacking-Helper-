name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v7

      - name: Python 설정
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: 의존성 설치
        run: python -m pip install -r requirements.txt

      - name: 단위 테스트
        run: python -B -m unittest discover -s tests -v
